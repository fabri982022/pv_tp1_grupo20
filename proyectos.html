<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Proyectos - Gestión Educativa</title>
</head>

<body>

    <!--Cabecera y navecacion-->
    <header>
        <h1>Plataforma de Gestión de Proyectos Educativos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="proyectos.html">Proyectos</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Explorador de Proyectos</h1>
        
        <!--Filtros-->
        <aside class="filtros">
            <h2>Filtros</h2>
            <div class="filtro-grupo">
                <label for="categoria">Categorías:</label>
                <select id="categoria">
                    <option value="todas">Todas</option>
                    <option value="web">Desarrollo Web</option>
                    <option value="movil">Aplicaciones Móviles</option>
                    <option value="datos">Ciencia de Datos</option>
                    <option value="sistemas">Sistemas</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="anio">Año:</label>
                <select id="anio">
                    <option value="Todos">Todos</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
            </div>
            <div class="filtro-grupo">
                <label for="estado">Estado:</label>
                <select id="estado">
                    <option value="todos">Todos</option>
                    <option value="curso">En curso</option>
                    <option value="finalizado">Finalizado</option>
                </select>
            </div>
        </aside>
    </main>
    
</body>

</html>
